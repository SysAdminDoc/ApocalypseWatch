name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - client/**
      - server/**
      - scripts/**
      - schema.sql
      - package.json
      - package-lock.json
      - .github/workflows/deploy-github-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Seed demo SQLite database
        run: python3 scripts/seed_demo_data.py

      - name: Export static dashboard snapshot
        run: npm run export:snapshot -- --output client/public/dashboard.json

      - name: Build client
        env:
          VITE_BASE_PATH: /ApocalypseWatch/
          VITE_DASHBOARD_URL: dashboard.json
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
